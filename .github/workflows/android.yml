name: Android CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  android-build-and-test:
    name: Android Build and E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.internal.http.connectionTimeout=120000 -Dorg.gradle.internal.http.socketTimeout=120000'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run Jest unit tests
        run: npm test -- --watch=false

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Assemble Debug
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Gradle logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gradle-logs
          path: |
            android/app/build/outputs/logs/
            android/build/reports/
          retention-days: 30

      - name: Unit Tests
        run: ./gradlew testDebugUnitTest
        working-directory: android

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-test-reports
          path: |
            android/app/build/reports/tests/
            android/app/build/test-results/
          if-no-files-found: ignore
          retention-days: 30

      - name: Detox E2E Tests
        if: github.event_name == 'workflow_dispatch'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-boot-timeout: 900
          script: |
            npm run test:e2e:android
        env:
          DETOX_CONFIGURATION: android.debug

      - name: Upload Detox artifacts
        uses: actions/upload-artifact@v4
        if: always() && github.event_name == 'workflow_dispatch'
        with:
          name: detox-artifacts
          path: |
            detox/artifacts/
            detox/*.log
          retention-days: 30

      - name: Upload emulator logcat
        uses: actions/upload-artifact@v4
        if: always() && github.event_name == 'workflow_dispatch'
        with:
          name: emulator-logcat
          path: artifacts/logcat.log
          retention-days: 30

  android-release-build:
    name: Android Release Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: android-build-and-test
    env:
      GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-release-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Assemble Release
        run: ./gradlew assembleRelease
        working-directory: android
        env:
          # CI smoke only: this build proves release packaging can launch.
          # It is not a production-signed artifact and must not be treated as one.
          ANDROID_SIGNING_ENABLED: false

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-ci-smoke-${{ github.run_number }}-${{ github.sha }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Verify APK launches
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          # A smaller image is enough for launch smoke and is materially more stable
          # than the API 34 Google APIs profile on GitHub's hosted runners.
          api-level: 30
          target: default
          arch: x86_64
          profile: Nexus 6
          emulator-boot-timeout: 1200
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: bash ./scripts/ci/verify-android-release.sh
