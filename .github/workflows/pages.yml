name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # Gate: All quality checks must pass before deploy
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee lint.log

      - name: Run type check
        run: |
          set -o pipefail
          npx tsc --noEmit 2>&1 | tee tsc.log

      - name: Run unit tests
        run: |
          set -o pipefail
          npm test -- --runInBand --coverage 2>&1 | tee jest.log

      - name: Upload quality logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-logs
          path: |
            lint.log
            tsc.log
            jest.log
          retention-days: 30

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  # Gate: E2E tests must pass before deploy
  e2e-gate:
    name: E2E Web Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality-gates
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build web app
        run: |
          set -o pipefail
          npm run build:web 2>&1 | tee build-web.log

      - name: Run Playwright E2E tests
        run: |
          set -o pipefail
          npm run e2e:smoke 2>&1 | tee e2e-smoke.log
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-deploy
          path: |
            playwright-report/
            test-results/
            playwright-*.log
            build-web.log
            e2e-smoke.log
          retention-days: 30

  # Build and deploy (only after gates pass)
  build:
    runs-on: ubuntu-latest
    needs: [quality-gates, e2e-gate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: |
          set -o pipefail
          npm run build:web 2>&1 | tee build-production.log

      - name: Copy SPA fallback
        run: cp public/404.html dist/404.html

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: production-build
          path: |
            ./dist
            build-production.log
          retention-days: 30

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Post-deploy validation
  post-deploy-check:
    name: Post-Deploy Validation
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests against production
        run: |
          npx playwright test e2e/smoke-basic.spec.ts --project=chromium
          npm run e2e:core
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: https://daytimeblues.github.io/ADHD-CADDI/

      - name: Upload post-deploy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: post-deploy-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30
