buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 26
        compileSdkVersion = 34
        targetSdkVersion = 34

        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.9.24"

        googlePlayServicesAuthVersion = "21.2.0"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.4.1")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        classpath("com.google.gms:google-services:4.4.4")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

def isWindows = System.properties['os.name'].toLowerCase().contains('windows')
def localAppData = System.getenv('LOCALAPPDATA')

if (isWindows && localAppData != null && !localAppData.isEmpty()) {
    def windowsBuildRoot = "${localAppData}/ADHD-CADDI-V1/android-build"
    rootProject.buildDir = file("${windowsBuildRoot}/build-root")
    subprojects { subproject ->
        subproject.buildDir = file("${windowsBuildRoot}/${subproject.name}")
    }
}

tasks.register('clean', Delete) {
    delete rootProject.buildDir
}

apply plugin: "com.facebook.react.rootproject"
