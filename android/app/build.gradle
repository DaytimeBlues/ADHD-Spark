plugins {
    id "com.android.application"
    id "com.facebook.react"
}

apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"
apply from: "../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"
applyNativeModulesAppBuildGradle(project)

project.ext.hermesEnabled = true
def useReleaseSigning = System.getenv('ANDROID_SIGNING_ENABLED') != 'false'
def generatedAudioResDir = file("$buildDir/generated/res/audio")

tasks.register("syncBundledAudioAssets", Exec) {
    workingDir rootProject.projectDir.parentFile
    commandLine "node", file("../../scripts/android/sync-audio-assets.js")
}

android {
    namespace "com.adhdcaddi"
    compileSdkVersion 34
    testBuildType "preview"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId "com.adhdcaddi"
        minSdkVersion 26
        targetSdkVersion 34
        versionCode 1
        versionName "1.0.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    sourceSets {
        main {
            res.srcDirs += [generatedAudioResDir]
        }
    }

    signingConfigs {
        release {
            storeFile file('release.keystore')
            storePassword System.getenv('KEYSTORE_PASSWORD')
            keyAlias System.getenv('KEY_ALIAS')
            keyPassword System.getenv('KEY_PASSWORD')
        }
    }

    buildTypes {
        debug {
            versionNameSuffix "-dev"
            minifyEnabled false
            shrinkResources false
        }
        preview {
            initWith release
            matchingFallbacks = ['release']
            signingConfig signingConfigs.debug
            minifyEnabled false
            applicationIdSuffix ".preview"
            versionNameSuffix "-preview"
        }
        release {
            // CI smoke signing uses the debug key only.
            // Real sideload releases require the keystore environment.
            signingConfig useReleaseSigning ? signingConfigs.release : signingConfigs.debug
            minifyEnabled true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

preBuild.dependsOn(syncBundledAudioAssets)

dependencies {
    implementation "com.facebook.react:react-android"
    implementation "com.facebook.react:hermes-android"

    implementation 'com.google.android.gms:play-services-auth:21.2.0'
    androidTestImplementation "androidx.test.ext:junit:1.1.5"
    androidTestImplementation "androidx.test.espresso:espresso-core:3.5.1"
    androidTestImplementation "androidx.test:rules:1.5.0"
    androidTestImplementation "androidx.test:runner:1.5.2"
    androidTestImplementation "androidx.test.uiautomator:uiautomator:2.3.0"
}
